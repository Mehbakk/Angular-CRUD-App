name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      # Récupération du code source
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      # Configuration de Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '14.17.3' # Version compatible avec votre projet Angular

      # Installation des dépendances
      - name: Install dependencies
        run: |
          npm ci

      # Build de l'application Angular
      - name: Build Angular App
        run: |
          npm run build --prod

      # Déploiement sur Azure Static Web Apps
      - name: Deploy to Azure Static Web Apps
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_HAPPY_FOREST_026074F10 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Utilisé pour les intégrations GitHub (ex. commentaires PR)
          action: "upload"
          app_location: "/" # Chemin du code source Angular
          output_location: "dist/<nom-de-votre-app>" # Remplacez <nom-de-votre-app> par le nom réel de l'application

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_HAPPY_FOREST_026074F10 }}
          action: "close"
